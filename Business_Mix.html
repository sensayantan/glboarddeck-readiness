<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Mix</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-datalabels/2.2.0/chartjs-plugin-datalabels.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: #F2F3F6; padding: 2rem; }
        .container { background: white; border-radius: 12px; padding: 30px; border: 1px solid #F2F3F6; box-shadow: 0 1px 4px rgba(0,0,0,.07); max-width: 1000px; margin: 0 auto; }
        .section-title { font-size: 18px; font-weight: 700; color: #181A24; margin-bottom: 8px; }
        .section-subtitle { font-size: 11px; color: #6B7280; margin-bottom: 20px; }
        .legend-container { display: flex; gap: 40px; margin-bottom: 30px; }
        .legend-item { display: flex; flex-direction: column; gap: 4px; }
        .legend-dot { width: 12px; height: 12px; border-radius: 2px; }
        .legend-label { font-size: 12px; font-weight: 600; color: #181A24; }
        .legend-bps { font-size: 11px; color: #6B7280; }
        .chart-wrapper { position: relative; width: 100%; height: 360px; margin-bottom: 30px; border: 1px solid #E5E7EB; border-radius: 8px; padding: 20px; }
        .data-section { background: #F9F8F6; padding: 20px; border-radius: 8px; margin-top: 20px; }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .data-label { font-size: 11px; color: #6B7280; font-weight: 600; }
        .toggle-btn { background: none; border: none; cursor: pointer; font-size: 18px; color: #4442E3; font-weight: bold; }
        .toggle-btn:hover { color: #3333c0; }
        .data-content { transition: all 0.3s ease; }
        .data-content.hidden { display: none; }
        .data-table { width: 100%; border-collapse: collapse; margin-bottom: 16px; }
        .data-table th { background: #E5E7EB; padding: 8px; text-align: left; font-size: 9px; font-weight: 600; color: #181A24; border: 1px solid #D1D5DB; }
        .data-table td { padding: 8px; border: 1px solid #D1D5DB; font-size: 10px; }
        .data-table input { width: 100%; padding: 5px; border: 1px solid #E5E7EB; border-radius: 3px; font-size: 10px; }
        .button-group { display: flex; gap: 10px; margin-top: 16px; }
        button { padding: 8px 16px; background: #4442E3; color: white; border: none; border-radius: 4px; font-size: 12px; font-weight: 600; cursor: pointer; }
        button:hover { background: #3333c0; }
        .reset-btn { background: #6B7280; }
        .reset-btn:hover { background: #535353; }
    </style>
</head>
<body>
    <div class="container">
        <h2 class="section-title">Business Mix</h2>
        <p class="section-subtitle">$M by quarter | T&M vs Non-T&M Revenue Split</p>
        
        <div class="legend-container">
            <div class="legend-item">
                <div style="display: flex; align-items: center; gap: 8px;">
                    <div class="legend-dot" style="background: #FF5F2D;"></div>
                    <span class="legend-label">Non-T&M</span>
                </div>
                <div class="legend-bps" id="nonTmBps"></div>
            </div>
            <div class="legend-item">
                <div style="display: flex; align-items: center; gap: 8px;">
                    <div class="legend-dot" style="background: #4442E3;"></div>
                    <span class="legend-label">T&M</span>
                </div>
            </div>
        </div>
        
        <div class="chart-wrapper">
            <canvas id="businessMixChart"></canvas>
        </div>

        <div class="data-section">
            <div class="section-header">
                <div class="data-label">EDIT SOURCE DATA</div>
                <button class="toggle-btn" onclick="toggleDataSection()">−</button>
            </div>
            <div class="data-content" id="dataContent">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Quarter</th>
                            <th>T&M ($M)</th>
                            <th>Non-T&M ($M)</th>
                        </tr>
                    </thead>
                    <tbody id="dataInputContainer"></tbody>
                </table>
                <div class="button-group">
                    <button onclick="updateChart()">Update Chart</button>
                    <button class="reset-btn" onclick="resetToDefault()">Reset to Default</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        Chart.register(ChartDataLabels);

        const defaultData = {
            'Q1\'25': { 'T&M': 369.1, 'Non-T&M': 75.9 },
            'Q2\'25': { 'T&M': 366.3, 'Non-T&M': 84.3 },
            'Q3\'25': { 'T&M': 363.6, 'Non-T&M': 89.8 },
            'Q4\'25': { 'T&M': 350.0, 'Non-T&M': 101.6 },
            'Q1\'26': { 'T&M': 320.4, 'Non-T&M': 105.8 }
        };

        let chart = null;
        const quarters = Object.keys(defaultData);

        function calculateBPS() {
            const q4_25_tm = 350.0;
            const q4_25_nonTm = 101.6;
            const q4_25_total = q4_25_tm + q4_25_nonTm;
            const q4_25_nonTmPct = (q4_25_nonTm / q4_25_total) * 100;

            const q1_26_tm = parseFloat(document.getElementById('Q1\'26-T&M').value) || 320.4;
            const q1_26_nonTm = parseFloat(document.getElementById('Q1\'26-Non-T&M').value) || 105.8;
            const q1_26_total = q1_26_tm + q1_26_nonTm;
            const q1_26_nonTmPct = (q1_26_nonTm / q1_26_total) * 100;

            const nonTmBps = (q1_26_nonTmPct - q4_25_nonTmPct) * 100;

            const nonTmSign = nonTmBps >= 0 ? '+' : '';

            document.getElementById('nonTmBps').textContent = nonTmSign + nonTmBps.toFixed(0) + ' BPS';
        }

        function initializeInputs() {
            const container = document.getElementById('dataInputContainer');
            container.innerHTML = '';
            quarters.forEach(quarter => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><strong>${quarter}</strong></td>
                    <td><input type="number" id="${quarter}-T&M" value="${defaultData[quarter]['T&M']}" step="0.1" min="0" onchange="calculateBPS()"></td>
                    <td><input type="number" id="${quarter}-Non-T&M" value="${defaultData[quarter]['Non-T&M']}" step="0.1" min="0" onchange="calculateBPS()"></td>
                `;
                container.appendChild(row);
            });
        }

        function updateChart() {
            const tmData = quarters.map(q => parseFloat(document.getElementById(`${q}-T&M`).value) || 0);
            const nonTmData = quarters.map(q => parseFloat(document.getElementById(`${q}-Non-T&M`).value) || 0);

            const canvas = document.getElementById('businessMixChart');
            const ctx = canvas.getContext('2d');
            
            if (chart) chart.destroy();

            chart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: quarters,
                    datasets: [
                        {
                            label: 'Non-T&M',
                            data: nonTmData,
                            backgroundColor: '#FF5F2D',
                            borderRadius: 0,
                            barThickness: 70
                        },
                        {
                            label: 'T&M',
                            data: tmData,
                            backgroundColor: '#4442E3',
                            borderRadius: 0,
                            barThickness: 70
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        datalabels: {
                            color: 'white',
                            font: { weight: 'bold', size: 10 },
                            formatter: function(value, ctx) {
                                if (value === 0) return '';
                                const qIdx = ctx.dataIndex;
                                const tm = tmData[qIdx];
                                const nonTm = nonTmData[qIdx];
                                const total = tm + nonTm;
                                const pct = ((value / total) * 100).toFixed(2);
                                return pct + '%';
                            },
                            anchor: 'center',
                            align: 'center'
                        },
                        tooltip: {
                            callbacks: {
                                label: (context) => context.dataset.label + ': $' + context.parsed.y.toFixed(1) + 'M'
                            }
                        }
                    },
                    scales: {
                        x: {
                            stacked: true,
                            grid: { display: false },
                            ticks: { font: { size: 11, weight: '600' }, color: '#181A24' }
                        },
                        y: {
                            stacked: true,
                            beginAtZero: true,
                            max: 550,
                            ticks: { display: false },
                            grid: { display: false }
                        }
                    }
                }
            });

            addTotalLabels(tmData, nonTmData);
            calculateBPS();
        }

        function addTotalLabels(tmData, nonTmData) {
            setTimeout(() => {
                const wrapper = document.querySelector('.chart-wrapper');
                const existingSvg = wrapper.querySelector('svg.total-labels');
                if (existingSvg) existingSvg.remove();

                const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
                svg.setAttribute('width', wrapper.offsetWidth);
                svg.setAttribute('height', wrapper.offsetHeight);
                svg.setAttribute('class', 'total-labels');
                svg.style.position = 'absolute';
                svg.style.top = '0';
                svg.style.left = '0';
                svg.style.pointerEvents = 'none';
                svg.style.zIndex = '10';

                const xScale = chart.scales.x;
                const yScale = chart.scales.y;
                const padding = 20;

                quarters.forEach((quarter, idx) => {
                    const tmVal = tmData[idx];
                    const nonTmVal = nonTmData[idx];
                    const total = tmVal + nonTmVal;

                    const xPos = xScale.getPixelForValue(idx) + padding;
                    const yPos = yScale.getPixelForValue(total) - 8;

                    const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                    label.setAttribute('x', xPos);
                    label.setAttribute('y', yPos);
                    label.setAttribute('text-anchor', 'middle');
                    label.setAttribute('font-size', '13');
                    label.setAttribute('font-weight', '700');
                    label.setAttribute('fill', '#181A24');
                    label.textContent = '$' + total.toFixed(0) + 'M';
                    svg.appendChild(label);
                });

                wrapper.appendChild(svg);
            }, 500);
        }

        function resetToDefault() {
            quarters.forEach(quarter => {
                ['T&M', 'Non-T&M'].forEach(type => {
                    const input = document.getElementById(`${quarter}-${type}`);
                    if (input) input.value = defaultData[quarter][type];
                });
            });
            updateChart();
        }

        function toggleDataSection() {
            const content = document.getElementById('dataContent');
            const btn = document.querySelector('.toggle-btn');
            content.classList.toggle('hidden');
            btn.textContent = content.classList.contains('hidden') ? '+' : '−';
        }

        window.addEventListener('load', () => {
            initializeInputs();
            updateChart();
        });
    </script>
</body>
</html>
